trigger:
  branches:
    include:
      - main
  paths:
    include:
      - Dockerfile
      - azure-pipelines.yml
      - Zvani.Application/**

pool:
  vmImage: ubuntu-latest

variables:
  - group: zvani-group

  - name: dockerfilePath
    value: Dockerfile

  - name: buildContext
    value: .

  - name: tag
    value: $(Build.BuildId)

steps:
  - task: Docker@2
    displayName: Build and push image
    inputs:
      command: buildAndPush
      containerRegistry: $(dockerRegistryServiceConnection)
      repository: $(imageRepository)
      dockerfile: $(dockerfilePath)
      buildContext: $(buildContext)
      tags: |
        $(tag)
        $(Build.SourceBranchName)

  - task: DownloadSecureFile@1
    name: prodAppSettings
    displayName: Download production appsettings.json
    inputs:
      secureFile: $(secureAppSettingsFile)

  - task: AzureCLI@2
    displayName: Deploy Azure Container App
    inputs:
      azureSubscription: $(azureSubscription)
      scriptType: bash
      scriptLocation: inlineScript
      inlineScript: |
        set -euo pipefail

        mapfile -d '' env_vars < <(
          jq -r '
            paths(scalars) as $path |
            ($path | map(tostring) | join("__")) + "=" + (getpath($path) | tostring) + "\u0000"
          ' "$(prodAppSettings.secureFilePath)"
        )

        env_vars+=("ASPNETCORE_ENVIRONMENT=Production")
        env_vars+=("ASPNETCORE_URLS=http://+:8080")

        az containerapp update \
          --resource-group "$(resourceGroupName)" \
          --name "$(appName)" \
          --image "$(imageName):$(tag)" \
          --set-env-vars "${env_vars[@]}"