trigger:
  branches:
    include:
      - main
  paths:
    include:
      - Dockerfile
      - azure-pipelines.yml
      - Zvani.Application/**

pool:
  vmImage: ubuntu-latest

variables:
  - group: zvani-group

  - name: dockerfilePath
    value: Dockerfile

  - name: buildContext
    value: .

  - name: tag
    value: $(Build.BuildId)

steps:
  - task: Docker@2
    displayName: Build and push image
    inputs:
      command: buildAndPush
      containerRegistry: $(dockerRegistryServiceConnection)
      repository: $(imageRepository)
      dockerfile: $(dockerfilePath)
      buildContext: $(buildContext)
      tags: |
        $(tag)
        $(Build.SourceBranchName)

  - task: DownloadSecureFile@1
    name: prodAppSettings
    displayName: Download production appsettings.json
    inputs:
      secureFile: $(secureAppSettingsFile)

  - task: AzureCLI@2
    displayName: Apply appsettings.json to Azure App Service
    inputs:
      azureSubscription: $(azureSubscription)
      scriptType: bash
      scriptLocation: inlineScript
      inlineScript: |
        set -euo pipefail

        mapfile -d '' app_settings < <(
          jq -r '
            paths(scalars) as $path |
            ($path | map(tostring) | join("__")) + "=" + (getpath($path) | tostring) + "\u0000"
          ' "$(prodAppSettings.secureFilePath)"
        )

        app_settings+=("WEBSITES_PORT=8080")
        app_settings+=("ASPNETCORE_ENVIRONMENT=Production")

        az webapp config appsettings set \
          --resource-group "$(resourceGroupName)" \
          --name "$(appName)" \
          --settings "${app_settings[@]}" \
          --output none

  - task: AzureWebAppContainer@1
    displayName: Deploy container to Azure App Service
    inputs:
      azureSubscription: $(azureSubscription)
      appName: $(appName)
      containers: $(imageName):$(tag)